services:
  - type: web
    name: tokyo-shinchiku-mansion
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GOOGLE_MAPS_KEY_BROWSER
        sync: false   # browser-only key; restrict by HTTP referrer in Google Cloud
      - key: GOOGLE_MAPS_KEY_SERVER
        sync: false   # server-only key; restrict by API and application settings as tightly as possible
