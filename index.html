<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokyo Mansion</title>
  <link rel="stylesheet" href="./public/styles.css" />
</head>
<body>
<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
  <h1>Tokyo Mansion <span style="font-size:11px;font-weight:400;opacity:.7;letter-spacing:.3px">v0.1.1</span></h1>
  <span class="header-badge" id="header-count">読込中…</span>
</header>

<div id="map-section">
  <div id="map"></div>
  <div id="map-legend">
    <div class="legend-item"><span class="legend-dot" style="background:#e8351a"></span>新築</div>
    <div class="legend-item"><span class="legend-dot" style="background:#4f46e5"></span>中古</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>お気に入り</div>
  </div>
  <div id="geocode-status"></div>
</div>

<main>
  <div id="status-bar">
    <span id="status-text">読み込み中…</span>
    <span class="spacer"></span>
    <button onclick="window.refreshProperties()">↻ 更新</button>
  </div>
  <div class="fetch-times" id="fetch-times" style="display:none">
    <div class="fetch-time-item"><span class="fetch-time-dot" style="background:#e8351a"></span><span class="fetch-time-label">新築</span><span class="fetch-time-val" id="ft-new">—</span></div>
    <div class="fetch-time-item"><span class="fetch-time-dot" style="background:#4f46e5"></span><span class="fetch-time-label">中古</span><span class="fetch-time-val" id="ft-chuko">—</span></div>
  </div>

  <div id="loading-state"><div class="spinner"></div><p>物件情報を取得中…</p></div>

  <div id="error-state" style="display:none">
    <p>⚠️ データを取得できませんでした</p>
    <button onclick="window.refreshProperties()" style="margin-top:12px;padding:8px 20px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer">再試行</button>
  </div>

  <div id="filter-bar" style="display:none"><div id="pref-filter"></div></div>
  <div id="property-grid"></div>
  <div id="empty-state"><div class="icon">📭</div><p>表示できる物件がありません。</p></div>
</main>

<script type="module" src="./public/js/app.js"></script>
</body>
</html>
